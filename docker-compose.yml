version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iptv-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iptv_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: iptv-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iptv-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:password@db:5432/iptv_db?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - hls_data:/usr/src/app/hls
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: iptv-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/var/www/hls:ro
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: iptv-admin
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
      - PORT=3000
    depends_on:
      - backend
      - nginx

volumes:
  postgres_data:
  redis_data:
  hls_data:
