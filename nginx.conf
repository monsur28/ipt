events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip manifest compression for low payload sizes and faster retrieval
    gzip on;
    gzip_types application/vnd.apple.mpegurl application/x-mpegurl application/json text/plain text/css application/javascript;
    gzip_min_length 1000;

    # Rate limiting zone definitions to protect routes against scraper bots
    # api_limit: max 20 requests per second with burst tolerance
    # stream_limit: max 50 requests per second for HLS segments
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name localhost;

        # Global CORS configuration
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, PATCH, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Serve static HLS streams (.m3u8 playlists and .ts chunks)
        location /hls {
            alias /var/www/hls;
            
            # Apply rate limiting zone to prevent HLS segment flooding
            limit_req zone=stream_limit burst=30 nodelay;

            # Manifests: Cache on CDN edge for 5 seconds to reduce origin requests
            location ~* \.m3u8$ {
                add_header Cache-Control "public, max-age=5";
                add_header 'Access-Control-Allow-Origin' '*' always;
                expires 5s;
            }

            # Media Segments: Cache on CDN edge for 60 seconds (safe since segments are immutable)
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=60";
                add_header 'Access-Control-Allow-Origin' '*' always;
                expires 60s;
            }
        }

        # Proxy Fastify backend REST API
        location /api {
            # Apply API rate limit zone
            limit_req zone=api_limit burst=15 nodelay;

            proxy_pass http://backend:8080/api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy server health check
        location /health {
            proxy_pass http://backend:8080/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Fallback location
        location / {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
